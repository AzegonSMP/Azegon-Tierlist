<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ᴀᴢᴇɢᴏɴ ᴛɪᴇʀʟɪꜱᴛ</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Inter, system-ui, sans-serif;
  }

  body {
    background:
      radial-gradient(circle at top left, rgba(38, 78, 145, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(27, 104, 157, 0.12), transparent 28%),
      linear-gradient(180deg, #07101d 0%, #091321 100%);
    color: #e8edf7;
    min-height: 100vh;
    padding: 24px;
    overflow-x: hidden;
  }

  .app {
    max-width: 1700px;
    margin: 0 auto;
    filter: blur(10px);
    opacity: 0.5;
    transition: filter 0.7s ease, opacity 0.7s ease;
  }

  .app.loaded {
    filter: blur(0px);
    opacity: 1;
  }

  .navbar {
    min-height: 78px;
    background: rgba(10, 18, 31, 0.85);
    border: 1px solid rgba(75, 104, 152, 0.16);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.28);
    backdrop-filter: blur(14px);
    margin-bottom: 26px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
  }

  .brand {
    font-size: 1.7rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #f7c35f;
    text-shadow: 0 2px 18px rgba(255,174,0,0.18);
  }

  .nav-links {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .nav-link {
    color: #7f8da3;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    padding: 10px 14px;
    border-radius: 14px;
    transition: 0.2s ease;
  }

  .nav-link.active,
  .nav-link:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
  }

  .search-box {
    background: rgba(23, 34, 54, 0.9);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 12px 18px;
    min-width: 300px;
    color: #dbe5f3;
    font-size: 0.96rem;
    outline: none;
  }

  .tabs {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab {
    min-width: 118px;
    height: 82px;
    border-radius: 24px 24px 0 0;
    background: rgba(10, 18, 31, 0.78);
    border: 1px solid rgba(75, 104, 152, 0.16);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #7f8da3;
    font-weight: 800;
    font-size: 0.95rem;
    transition: 0.18s ease;
    cursor: pointer;
    box-shadow: inset 0 -12px 30px rgba(255,255,255,0.015);
    flex-shrink: 0;
  }

  .tab.active {
    color: #ffffff;
    border-color: rgba(255,255,255,0.1);
    box-shadow: inset 0 -1px 0 #ffffff;
  }

  .page {
    display: none;
  }

  .page.active {
    display: block;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  .panel,
  .top-panel {
    background: rgba(8, 15, 28, 0.88);
    border: 1px solid rgba(75, 104, 152, 0.16);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .panel {
    border-top-left-radius: 0;
  }

  .panel-top {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .info-btn {
    background: rgba(34, 51, 82, 0.95);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .table-header,
  .player-row {
    display: grid;
    grid-template-columns: 2fr 0.8fr 1fr 1fr 1fr 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
  }

  .table-header {
    color: #31435f;
    font-weight: 900;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-row {
    background: linear-gradient(180deg, rgba(15,25,42,0.95), rgba(10,18,31,0.95));
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 20px;
    min-height: 64px;
    padding: 12px 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }

  .username-box {
    font-weight: 900;
    font-size: 1rem;
    border-radius: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
  }

  .username-box.gold-text { color: #ffd84d; }
  .username-box.silver-text { color: #8f96a3; }
  .username-box.bronze-text { color: #c5976c; }

  .rank-box {
    font-weight: 700;
    text-align: center;
  }

  .top-title {
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 16px;
    color: #f3f6fc;
    letter-spacing: 0.03em;
  }

  .podium {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .podium-card {
    border-radius: 20px;
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .gold {
    background: linear-gradient(135deg, rgba(255, 214, 72, 0.22), rgba(161, 117, 0, 0.16));
  }

  .silver {
    background: linear-gradient(135deg, rgba(127, 140, 153, 0.22), rgba(93, 104, 116, 0.16));
  }

  .bronze {
    background: linear-gradient(135deg, rgba(184, 133, 94, 0.22), rgba(115, 74, 42, 0.16));
  }

  .podium-rank {
    font-size: 0.82rem;
    font-weight: 900;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .podium-name {
    font-size: 1.12rem;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .podium-score {
    font-size: 0.96rem;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .podium-mode {
    font-size: 0.88rem;
    font-weight: 800;
    padding: 8px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    margin-bottom: 6px;
  }

  .ranking-board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
  }

  .tier-column {
    background: rgba(8, 15, 28, 0.88);
    border: 1px solid rgba(75, 104, 152, 0.16);
    border-radius: 24px;
    overflow: hidden;
    min-height: 500px;
  }

  .tier-header {
    padding: 18px;
    font-size: 1.8rem;
    font-weight: 900;
    text-align: center;
  }

  .tier-1 .tier-header { background: rgba(255, 183, 0, 0.28); color: #ffbc1f; }
  .tier-2 .tier-header { background: rgba(148, 158, 171, 0.25); color: #b6c0cb; }
  .tier-3 .tier-header { background: rgba(168, 98, 48, 0.25); color: #da9155; }
  .tier-4 .tier-header { background: rgba(40, 56, 84, 0.4); color: #c8d3e3; }
  .tier-5 .tier-header { background: rgba(40, 56, 84, 0.4); color: #c8d3e3; }

  .tier-list {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .tier-player {
    background: rgba(43, 57, 81, 0.8);
    border-radius: 14px;
    padding: 12px 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .overlay-content {
    background: #0a121f;
    padding: 24px 36px;
    border-radius: 16px;
    color: #fff;
    font-size: 1.1rem;
    text-align: center;
    max-width: 90%;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6, 10, 18, 0.88);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .loading-overlay.hide {
    opacity: 0;
    visibility: hidden;
  }

  .loading-box {
    padding: 30px 40px;
    border-radius: 28px;
    background: rgba(12, 18, 30, 0.9);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    min-width: 280px;
    text-align: center;
  }

  .spinner {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    border: 4px solid rgba(255,255,255,0.12);
    border-top: 4px solid #f7c35f;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  .loading-text {
    font-size: 1.2rem;
    font-weight: 800;
    color: #f3f6fc;
  }

  .dots {
    display: inline-block;
    width: 28px;
    text-align: left;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 1200px) {
    .ranking-board {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 900px) {
    body { padding: 14px; }
    .main-grid { grid-template-columns: 1fr; }
    .search-box { width: 100%; min-width: 0; }
    .navbar { flex-direction: column; align-items: stretch; padding: 18px; }
    .table-header { display: none; }

    .player-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
    }

    .player-row > div {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .player-row > div::before {
      font-weight: 800;
      color: #7f8da3;
      min-width: 95px;
    }

    .player-row > div:nth-child(1)::before { content: "Username"; }
    .player-row > div:nth-child(2)::before { content: "Score"; }
    .player-row > div:nth-child(3)::before { content: "Region"; }
    .player-row > div:nth-child(4)::before { content: "Sword"; }
    .player-row > div:nth-child(5)::before { content: "DiaSMP"; }
    .player-row > div:nth-child(6)::before { content: "Mace"; }

    .ranking-board {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">
      Loading Tierlist<span class="dots" id="loadingDots">.</span>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="navbar">
    <div class="nav-left">
      <div class="brand">ᴀᴢᴇɢᴏɴ ᴛɪᴇʀʟɪꜱᴛ</div>
      <div class="nav-links">
        <div class="nav-link active" data-page="home">Home</div>
        <div class="nav-link" data-page="rankings">Rankings</div>
      </div>
    </div>
    <input type="text" class="search-box" id="searchBox" placeholder="Search player..." />
  </div>

  <!-- HOME PAGE -->
  <div class="page active" id="homePage">
    <div class="tabs">
      <div class="tab active" data-mode="overall">🏆 Overall</div>
      <div class="tab" data-mode="sword">Sword</div>
      <div class="tab" data-mode="smp">SMP</div>
      <div class="tab" data-mode="mace">Mace</div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-top">
          <button class="info-btn info-open">ⓘ Information</button>
        </div>

        <div class="table-header">
          <div>Username</div>
          <div>Total Score</div>
          <div>Region</div>
          <div>Sword Tier</div>
          <div>DiaSMP Tier</div>
          <div>Mace Tier</div>
        </div>

        <div class="rows" id="rows"></div>
      </div>

      <div class="top-panel">
        <div class="top-title">Top Scorers</div>
        <div class="podium" id="topScorers"></div>
      </div>
    </div>
  </div>

  <!-- RANKINGS PAGE -->
  <div class="page" id="rankingsPage">
    <div class="tabs">
      <div class="tab active ranking-tab" data-ranking-mode="sword">Sword</div>
      <div class="tab ranking-tab" data-ranking-mode="smp">DiaSMP</div>
      <div class="tab ranking-tab" data-ranking-mode="mace">Mace</div>
    </div>

    <div class="panel" style="border-radius:24px;">
      <div class="panel-top">
        <button class="info-btn info-open">ⓘ Information</button>
      </div>

      <div class="ranking-board">
        <div class="tier-column tier-1">
          <div class="tier-header">🏆 Tier 1</div>
          <div class="tier-list" id="tier1"></div>
        </div>
        <div class="tier-column tier-2">
          <div class="tier-header">🏆 Tier 2</div>
          <div class="tier-list" id="tier2"></div>
        </div>
        <div class="tier-column tier-3">
          <div class="tier-header">🏆 Tier 3</div>
          <div class="tier-list" id="tier3"></div>
        </div>
        <div class="tier-column tier-4">
          <div class="tier-header">Tier 4</div>
          <div class="tier-list" id="tier4"></div>
        </div>
        <div class="tier-column tier-5">
          <div class="tier-header">Tier 5</div>
          <div class="tier-list" id="tier5"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    Want To Tier Test? Join
    <br><br>
    <a href="https://discord.gg/zD6DkhGb5w" target="_blank" style="color:#f7c35f; font-weight:900;">
      https://discord.gg/zD6DkhGb5w
    </a>
  </div>
</div>

<script>
const players = [
  { username: "Mr_celsius", region:"AS", gamemodes:{ Sword:{score:40,tier:"HT4"}, DiaSMP:{score:2,tier:"LT4"} } },
  { username: "karru094gg", region:"EU", gamemodes:{ Sword:{score:20,tier:"LT3"}, DiaSMP:{score:2,tier:"LT3"} } },
  { username: "NOVAL_MC", region:"AS", gamemodes:{ Sword:{score:16,tier:"HT4"} } },
  { username: "ShifTide", region:"AS", gamemodes:{ DiaSMP:{score:8,tier:"HT4"} } },
  { username: "Pandboid", region:"EU", gamemodes:{ DiaSMP:{score:7,tier:"LT3"} } },
  { username: "showthemeadil", region:"EU", gamemodes:{ Sword:{score:3,tier:"HT5"} } },
  { username: "Lakerekn", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } },
  { username: "ryf_t", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"LT4"} } },
  { username: "otonashizero17", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } },
  { username: "cantstunslam123", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"LT5"} } },
  { username: "Superjustplayz", region:"AS", gamemodes:{ Sword:{score:0,tier:"LT5"} } },
  { username: "datminecrafter1", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"LT5"} } },
  { username: "sugodo", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } }
];

const tierOrder = {
  "HT1": 10, "LT1": 9,
  "HT2": 8, "LT2": 7,
  "HT3": 6, "LT3": 5,
  "HT4": 4, "LT4": 3,
  "HT5": 2, "LT5": 1,
  "Unranked": 0, "—": 0, "": 0
};

let currentMode = "overall";
let currentRankingMode = "sword";

const rows = document.getElementById("rows");
const topScorers = document.getElementById("topScorers");
const searchBox = document.getElementById("searchBox");
const tabs = document.querySelectorAll(".tab[data-mode]");
const navLinks = document.querySelectorAll(".nav-link");
const pages = {
  home: document.getElementById("homePage"),
  rankings: document.getElementById("rankingsPage")
};

function getTierValue(tier) {
  return tierOrder[tier] || 0;
}

function getBestTierValue(player) {
  return Math.max(
    getTierValue(player.SwordTier),
    getTierValue(player.SMPtier),
    getTierValue(player.MaceTier)
  );
}

function getRenderedPlayers(list) {
  return list.map(player => {
    if(currentMode === "overall") {
      let totalScore = 0;
      let SwordTier = "Unranked";
      let SMPtier = "Unranked";
      let MaceTier = "Unranked";

      if(player.gamemodes.Sword){
        totalScore += player.gamemodes.Sword.score;
        SwordTier = player.gamemodes.Sword.tier;
      }
      if(player.gamemodes.DiaSMP){
        totalScore += player.gamemodes.DiaSMP.score;
        SMPtier = player.gamemodes.DiaSMP.tier;
      }
      if(player.gamemodes.Mace){
        totalScore += player.gamemodes.Mace.score;
        MaceTier = player.gamemodes.Mace.tier;
      }

      return { username: player.username, region: player.region, totalScore, SwordTier, SMPtier, MaceTier };
    }

    if(currentMode === "sword" && player.gamemodes.Sword){
      return { username: player.username, region: player.region, totalScore: player.gamemodes.Sword.score, SwordTier: player.gamemodes.Sword.tier, SMPtier: "—", MaceTier: "—" };
    }

    if(currentMode === "smp" && player.gamemodes.DiaSMP){
      return { username: player.username, region: player.region, totalScore: player.gamemodes.DiaSMP.score, SwordTier: "—", SMPtier: player.gamemodes.DiaSMP.tier, MaceTier: "—" };
    }

    if(currentMode === "mace" && player.gamemodes.Mace){
      return { username: player.username, region: player.region, totalScore: player.gamemodes.Mace.score, SwordTier: "—", SMPtier: "—", MaceTier: player.gamemodes.Mace.tier };
    }

    return null;
  }).filter(Boolean).sort((a, b) => {
    if (b.totalScore !== a.totalScore) return b.totalScore - a.totalScore;
    return getBestTierValue(b) - getBestTierValue(a);
  });
}

function getUsernameClass(index) {
  if(index === 0) return "gold-text";
  if(index === 1) return "silver-text";
  if(index === 2) return "bronze-text";
  return "";
}

function renderTopScorers(list) {
  const top3 = list.slice(0, 3);
  const classes = ["gold", "silver", "bronze"];
  const labels = ["#1 Top Scorer", "#2 Top Scorer", "#3 Top Scorer"];
  topScorers.innerHTML = "";

  top3.forEach((player, index) => {
    const card = document.createElement("div");
    card.className = `podium-card ${classes[index]}`;
    card.innerHTML = `
      <div class="podium-rank">${labels[index]}</div>
      <div class="podium-name">${player.username}</div>
      <div class="podium-score">Score: ${player.totalScore}</div>
      <div class="podium-mode">${player.SwordTier} Sword</div>
      <div class="podium-mode">${player.SMPtier} SMP</div>
      <div class="podium-mode">${player.MaceTier} Mace</div>
    `;
    topScorers.appendChild(card);
  });
}

function renderRows(list) {
  const filtered = getRenderedPlayers(list);
  rows.innerHTML = "";

  filtered.forEach((player, index) => {
    const row = document.createElement("div");
    row.className = "player-row";
    row.innerHTML = `
      <div class="username-box ${getUsernameClass(index)}">${player.username}</div>
      <div class="rank-box">${player.totalScore}</div>
      <div>${player.region}</div>
      <div>${player.SwordTier}</div>
      <div>${player.SMPtier}</div>
      <div>${player.MaceTier}</div>
    `;
    rows.appendChild(row);
  });

  renderTopScorers(filtered);
}

function renderRankingBoard(mode) {
  document.getElementById("tier1").innerHTML = "";
  document.getElementById("tier2").innerHTML = "";
  document.getElementById("tier3").innerHTML = "";
  document.getElementById("tier4").innerHTML = "";
  document.getElementById("tier5").innerHTML = "";

  const modeMap = {
    sword: "Sword",
    smp: "DiaSMP",
    mace: "Mace"
  };

  const game = modeMap[mode];
  const filtered = players.filter(p => p.gamemodes[game]);

  filtered.forEach(player => {
    const tier = player.gamemodes[game].tier;
    const tierNumber = tier.replace(/[A-Z]/g, "").replace(/[a-z]/g, "");
    const target = document.getElementById(`tier${tierNumber}`);
    if(target) {
      const div = document.createElement("div");
      div.className = "tier-player";
      div.innerHTML = `<span>${player.username}</span><span>${tier}</span>`;
      target.appendChild(div);
    }
  });
}

searchBox.addEventListener("input", () => {
  const value = searchBox.value.toLowerCase();
  const filtered = players.filter(player => player.username.toLowerCase().includes(value));
  renderRows(filtered);
});

tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.dataset.mode;
    renderRows(players);
  });
});

document.querySelectorAll(".ranking-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".ranking-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentRankingMode = tab.dataset.rankingMode;
    renderRankingBoard(currentRankingMode);
  });
});

navLinks.forEach(link => {
  link.addEventListener("click", () => {
    navLinks.forEach(l => l.classList.remove("active"));
    link.classList.add("active");

    const page = link.dataset.page;
    Object.values(pages).forEach(p => p.classList.remove("active"));
    pages[page].classList.add("active");
  });
});

/* FIXED INFO BUTTONS */
document.querySelectorAll(".info-open").forEach(btn => {
  btn.addEventListener("click", () => {
    document.getElementById("overlay").style.display = "flex";
  });
});

document.getElementById("overlay").addEventListener("click", (e) => {
  if (e.target.id === "overlay") {
    document.getElementById("overlay").style.display = "none";
  }
});

let dotCount = 1;
const dotInterval = setInterval(() => {
  dotCount = dotCount % 3 + 1;
  document.getElementById("loadingDots").textContent = ".".repeat(dotCount);
}, 533);

setTimeout(() => {
  clearInterval(dotInterval);
  document.getElementById("loadingOverlay").classList.add("hide");
  document.getElementById("app").classList.add("loaded");
}, 1800);

renderRows(players);
renderRankingBoard("sword");
</script>
</body>
</html>
