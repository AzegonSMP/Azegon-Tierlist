<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ᴀᴢᴇɢᴏɴ ᴛɪᴇʀʟɪꜱᴛ</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Inter, system-ui, sans-serif;
  }

  body {
    background:
      radial-gradient(circle at top left, rgba(38, 78, 145, 0.18), transparent 30%),
      radial-gradient(circle at top right, rgba(27, 104, 157, 0.12), transparent 28%),
      linear-gradient(180deg, #07101d 0%, #091321 100%);
    color: #e8edf7;
    min-height: 100vh;
    padding: 24px;
    overflow-x: hidden;
  }

  .app {
    max-width: 1600px;
    margin: 0 auto;
    filter: blur(10px);
    opacity: 0.5;
    transition: filter 0.7s ease, opacity 0.7s ease;
  }

  .app.loaded {
    filter: blur(0px);
    opacity: 1;
  }

  .navbar {
    min-height: 78px;
    background: rgba(10,18,31,0.85);
    border: 1px solid rgba(75,104,152,0.16);
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.28);
    backdrop-filter: blur(14px);
    margin-bottom: 30px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: #f7c35f;
    text-shadow: 0 2px 18px rgba(255,174,0,0.18);
    flex: 1 1 auto;
  }

  .search-box {
    background: rgba(23,34,54,0.9);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 18px;
    padding: 12px 18px;
    min-width: 300px;
    color: #dbe5f3;
    font-size: 0.96rem;
    outline: none;
  }

  .tabs {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab {
    min-width: 118px;
    height: 82px;
    border-radius: 24px 24px 0 0;
    background: rgba(10,18,31,0.78);
    border: 1px solid rgba(75,104,152,0.16);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #7f8da3;
    font-weight: 800;
    font-size: 0.95rem;
    transition: 0.18s ease;
    cursor: pointer;
    position: relative;
    box-shadow: inset 0 -12px 30px rgba(255,255,255,0.015);
    flex-shrink: 0;
  }

  .tab.active {
    color: #ffffff;
    border-color: rgba(255,255,255,0.1);
    box-shadow: inset 0 -1px 0 #ffffff;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  .panel,
  .top-panel {
    background: rgba(8,15,28,0.88);
    border: 1px solid rgba(75,104,152,0.16);
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 16px 50px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .panel {
    border-top-left-radius: 0;
  }

  .panel-top {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .info-btn {
    background: rgba(34,51,82,0.95);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .table-header, .player-row {
    display: grid;
    grid-template-columns: 2fr 0.8fr 1fr 1fr 1fr;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
  }

  .table-header {
    color: #31435f;
    font-weight: 900;
    font-size: 0.95rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .player-row {
    background: linear-gradient(180deg, rgba(15,25,42,0.95), rgba(10,18,31,0.95));
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 20px;
    min-height: 64px;
    padding: 12px 18px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
  }

  .username-box {
    font-weight: 900;
    font-size: 1rem;
    border-radius: 12px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    transition: 0.2s ease;
  }

  .username-box.gold-text {
    color: #ffd84d;
    text-shadow: 0 0 14px rgba(255, 216, 77, 0.25);
  }

  .username-box.silver-text {
    color: #7f8c99;
    text-shadow: 0 0 14px rgba(127, 140, 153, 0.22);
  }

  .username-box.bronze-text {
    color: #c5976c;
    text-shadow: 0 0 14px rgba(197, 151, 108, 0.18);
  }

  .rank-box {
    font-weight: 700;
    text-align: center;
  }

  .top-title {
    font-size: 1.1rem;
    font-weight: 900;
    margin-bottom: 16px;
    color: #f3f6fc;
    letter-spacing: 0.03em;
  }

  .podium {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .podium-card {
    border-radius: 20px;
    padding: 16px 18px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .podium-rank {
    font-size: 0.82rem;
    font-weight: 900;
    opacity: 0.9;
    margin-bottom: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .podium-name {
    font-size: 1.12rem;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .podium-score {
    font-size: 0.96rem;
    font-weight: 700;
    opacity: 0.92;
    margin-bottom: 10px;
  }

  .podium-modes {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .podium-mode {
    font-size: 0.88rem;
    font-weight: 800;
    opacity: 0.92;
    padding: 8px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.04);
  }

  .gold {
    background: linear-gradient(135deg, rgba(255, 214, 72, 0.22), rgba(161, 117, 0, 0.16));
    border-color: rgba(255, 215, 0, 0.24);
  }

  .silver {
    background: linear-gradient(135deg, rgba(127, 140, 153, 0.22), rgba(93, 104, 116, 0.16));
    border-color: rgba(127, 140, 153, 0.22);
  }

  .bronze {
    background: linear-gradient(135deg, rgba(184, 133, 94, 0.22), rgba(115, 74, 42, 0.16));
    border-color: rgba(181, 125, 82, 0.2);
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }

  .overlay-content {
    background: #0a121f;
    padding: 24px 36px;
    border-radius: 16px;
    color: #fff;
    font-size: 1.1rem;
    text-align: center;
    max-width: 90%;
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6, 10, 18, 0.88);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    transition: opacity 0.6s ease, visibility 0.6s ease;
  }

  .loading-overlay.hide {
    opacity: 0;
    visibility: hidden;
  }

  .loading-box {
    padding: 30px 40px;
    border-radius: 28px;
    background: rgba(12, 18, 30, 0.9);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    min-width: 280px;
    text-align: center;
  }

  .spinner {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    border: 4px solid rgba(255,255,255,0.12);
    border-top: 4px solid #f7c35f;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }

  .loading-text {
    font-size: 1.2rem;
    font-weight: 800;
    color: #f3f6fc;
    letter-spacing: 0.03em;
  }

  .dots {
    display: inline-block;
    width: 28px;
    text-align: left;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 900px) {
    body {
      padding: 14px;
    }

    .main-grid {
      grid-template-columns: 1fr;
    }

    .top-panel {
      width: 100%;
    }

    .search-box {
      width: 100%;
      min-width: 0;
    }

    .brand {
      width: 100%;
      font-size: 1.45rem;
      justify-content: center;
      text-align: center;
    }

    .navbar {
      flex-direction: column;
      align-items: stretch;
      padding: 18px;
    }

    .table-header {
      display: none;
    }

    .player-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      border-radius: 18px;
    }

    .player-row > div {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      font-size: 0.95rem;
    }

    .player-row > div::before {
      font-weight: 800;
      color: #7f8da3;
      min-width: 95px;
    }

    .player-row > div:nth-child(1)::before { content: "Username"; }
    .player-row > div:nth-child(2)::before { content: "Score"; }
    .player-row > div:nth-child(3)::before { content: "Region"; }
    .player-row > div:nth-child(4)::before { content: "Sword"; }
    .player-row > div:nth-child(5)::before { content: "DiaSMP"; }

    .username-box {
      flex: 1;
      justify-content: flex-end;
      text-align: right;
    }

    .rank-box {
      text-align: right;
      width: auto;
    }

    .loading-box {
      min-width: 0;
      width: 90%;
      max-width: 320px;
    }

    .overlay-content {
      font-size: 1rem;
      padding: 20px;
    }
  }

  @media (max-width: 500px) {
    .brand {
      font-size: 1.25rem;
    }

    .tab {
      min-width: 100px;
      height: 72px;
      font-size: 0.9rem;
    }

    .podium-name {
      font-size: 1rem;
    }

    .podium-score,
    .podium-mode {
      font-size: 0.85rem;
    }

    .info-btn {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box">
    <div class="spinner"></div>
    <div class="loading-text">
      Loading Tierlist<span class="dots" id="loadingDots">.</span>
    </div>
  </div>
</div>

<div class="app" id="app">
  <div class="navbar">
    <div class="brand">
      <span>ᴀᴢᴇɢᴏɴ ᴛɪᴇʀʟɪꜱᴛ</span>
    </div>
    <input type="text" class="search-box" id="searchBox" placeholder="Search player..." />
  </div>

  <div class="tabs">
    <div class="tab active" data-mode="overall">🏆 Overall</div>
    <div class="tab" data-mode="sword">⚔️ Sword</div>
    <div class="tab" data-mode="smp">🟢 SMP</div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-top">
        <button class="info-btn" id="infoBtn">ⓘ Information</button>
      </div>

      <div class="table-header">
        <div>Username</div>
        <div>Total Score</div>
        <div>Region</div>
        <div>Sword Tier</div>
        <div>DiaSMP Tier</div>
      </div>

      <div class="rows" id="rows"></div>
    </div>

    <div class="top-panel">
      <div class="top-title">Top Scorers</div>
      <div class="podium" id="topScorers"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    Want To Tier Test? Join
    <a href="https://discord.gg/zD6DkhGb5w" target="_blank" style="color:#f7c35f;">
      https://discord.gg/zD6DkhGb5w
    </a>
  </div>
</div>

<script>
const players = [
  { username: "Mr_celsius", region:"AS", gamemodes:{ Sword:{score:40,tier:"HT4"}, DiaSMP:{score:2,tier:"LT4"} } },
  { username: "karru094gg", region:"EU", gamemodes:{ Sword:{score:20,tier:"LT3"}, DiaSMP:{score:2,tier:"LT3"} } },
  { username: "NOVAL_MC", region:"AS", gamemodes:{ Sword:{score:16,tier:"HT4"} } },
  { username: "ShifTide", region:"AS", gamemodes:{ DiaSMP:{score:8,tier:"HT4"} } },
  { username: "Pandboid", region:"EU", gamemodes:{ DiaSMP:{score:7,tier:"LT3"} } },
  { username: "showthemeadil", region:"EU", gamemodes:{ Sword:{score:3,tier:"HT5"} } },
  { username: "Lakerekn", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } },
  { username: "ryf_t", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"LT4"} } },
  { username: "otonashizero17", region:"AS", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } },
  { username: "cantstunslam123", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"LT5"} } },
  { username: "Superjustplayz", region:"AS", gamemodes:{ Sword:{score:0,tier:"LT5"} } },
  { username: "datminecrafter1", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"LT5"} } },
  { username: "sugodo", region:"EU", gamemodes:{ DiaSMP:{score:0,tier:"HT5"} } }
];

const rows = document.getElementById("rows");
const searchBox = document.getElementById("searchBox");
const tabs = document.querySelectorAll(".tab");
const overlay = document.getElementById("overlay");
const app = document.getElementById("app");
const loadingOverlay = document.getElementById("loadingOverlay");
const loadingDots = document.getElementById("loadingDots");
const topScorers = document.getElementById("topScorers");

let currentMode = "overall";

const tierOrder = {
  "HT1": 10,
  "LT1": 9,
  "HT2": 8,
  "LT2": 7,
  "HT3": 6,
  "LT3": 5,
  "HT4": 4,
  "LT4": 3,
  "HT5": 2,
  "LT5": 1,
  "Unranked": 0,
  "": 0
};

function getBestTierValue(player) {
  const swordTier = player.SwordTier || "Unranked";
  const smpTier = player.SMPtier || "Unranked";
  return Math.max(tierOrder[swordTier] || 0, tierOrder[smpTier] || 0);
}

function getRenderedPlayers(list) {
  return list.map(player => {
    if(currentMode === "overall") {
      let totalScore = 0;
      let SwordTier = "Unranked";
      let SMPtier = "Unranked";

      if(player.gamemodes.Sword){
        totalScore += player.gamemodes.Sword.score;
        SwordTier = player.gamemodes.Sword.tier;
      }

      if(player.gamemodes.DiaSMP){
        totalScore += player.gamemodes.DiaSMP.score;
        SMPtier = player.gamemodes.DiaSMP.tier;
      }

      return {
        username: player.username,
        region: player.region,
        totalScore,
        SwordTier,
        SMPtier
      };
    }

    else if(currentMode === "sword" && player.gamemodes.Sword){
      return {
        username: player.username,
        region: player.region,
        totalScore: player.gamemodes.Sword.score,
        SwordTier: player.gamemodes.Sword.tier,
        SMPtier: "Unranked"
      };
    }

    else if(currentMode === "smp" && player.gamemodes.DiaSMP){
      return {
        username: player.username,
        region: player.region,
        totalScore: player.gamemodes.DiaSMP.score,
        SwordTier: "Unranked",
        SMPtier: player.gamemodes.DiaSMP.tier
      };
    }

    return null;
  }).filter(Boolean).sort((a, b) => {
    if (b.totalScore !== a.totalScore) {
      return b.totalScore - a.totalScore;
    }
    return getBestTierValue(b) - getBestTierValue(a);
  });
}

function renderTopScorers(list) {
  const top3 = list.slice(0, 3);
  const classes = ["gold", "silver", "bronze"];
  const labels = ["#1 Top Scorer", "#2 Top Scorer", "#3 Top Scorer"];

  topScorers.innerHTML = "";

  top3.forEach((player, index) => {
    const swordTier = player.SwordTier || "Unranked";
    const smpTier = player.SMPtier || "Unranked";

    const card = document.createElement("div");
    card.className = `podium-card ${classes[index]}`;
    card.innerHTML = `
      <div class="podium-rank">${labels[index]}</div>
      <div class="podium-name">${player.username}</div>
      <div class="podium-score">Score: ${player.totalScore}</div>
      <div class="podium-modes">
        <div class="podium-mode">${swordTier} Sword</div>
        <div class="podium-mode">${smpTier} SMP</div>
      </div>
    `;
    topScorers.appendChild(card);
  });
}

function getUsernameClass(index) {
  if(index === 0) return "gold-text";
  if(index === 1) return "silver-text";
  if(index === 2) return "bronze-text";
  return "";
}

function renderRows(list) {
  const filtered = getRenderedPlayers(list);
  rows.innerHTML = "";

  filtered.forEach((player, index) => {
    const row = document.createElement("div");
    row.className = "player-row";
    row.innerHTML = `
      <div class="username-box ${getUsernameClass(index)}">${player.username}</div>
      <div class="rank-box">${player.totalScore}</div>
      <div>${player.region}</div>
      <div>${player.SwordTier}</div>
      <div>${player.SMPtier}</div>
    `;
    rows.appendChild(row);
  });

  renderTopScorers(filtered);
}

searchBox.addEventListener("input", () => {
  const value = searchBox.value.toLowerCase();
  const filtered = players.filter(player =>
    player.username.toLowerCase().includes(value)
  );
  renderRows(filtered);
});

tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.getAttribute("data-mode");
    renderRows(players);
  });
});

document.getElementById("infoBtn").addEventListener("click", () => {
  overlay.style.display = "flex";
});

overlay.addEventListener("click", () => {
  overlay.style.display = "none";
});

renderRows(players);

const dotFrames = [".", "..", "..."];
let dotIndex = 0;

const dotInterval = setInterval(() => {
  loadingDots.textContent = dotFrames[dotIndex];
  dotIndex = (dotIndex + 1) % dotFrames.length;
}, 533);

window.addEventListener("load", () => {
  setTimeout(() => {
    clearInterval(dotInterval);
    app.classList.add("loaded");
    loadingOverlay.classList.add("hide");
  }, 1800);
});
</script>
</body>
</html>
